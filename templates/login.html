<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
  <style>
    :root{--bg:#eef1f4;--card:#ffffff;--ink:#1f2937;--muted:#6b7280;--line:#d1d5db;--accent:#374151;--accent-2:#111827}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(160deg,#eceff3,#dfe5eb);color:var(--ink);display:grid;place-items:center;min-height:100vh;margin:0}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;min-width:320px;max-width:420px;box-shadow:0 6px 20px rgba(0,0,0,.08)}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .brand img{width:28px;height:28px;display:block}
    h2{margin:0;color:var(--accent-2)}
    .sub{margin:0 0 12px 0;color:var(--muted);font-size:14px}
    .err{margin:0 0 10px 0;color:#b00020;font-size:13px;font-weight:700}
    input,button{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);margin-top:8px;font-size:15px}
    input{background:#fff}
    button{background:var(--accent);color:#fff;border:none;font-weight:700;cursor:pointer}
    button:hover{filter:brightness(.95)}
    .split{display:grid;grid-template-columns:1fr;gap:12px}
    .divider{height:1px;background:var(--line);margin:8px 0}
    .meta{margin-top:10px;font-size:13px;color:var(--muted)}
    a{color:#1f3b5b;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/static/northstar-logo.svg" alt="NorthStar logo">
      <h2>{{app_name}}</h2>
    </div>
    <p class="sub">Sign in to continue</p>
    {% if error %}<p class="err">{{error}}</p>{% endif %}

    <div class="split">
      <form method="post">
        <input type="hidden" name="mode" value="password">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
      </form>

    </div>

    <p class="meta">New here? <a href="/signup">Create an account</a></p>
    <p class="meta"><a href="/forgot-password">Forgot password?</a></p>
  </div>
  <script>
    try { localStorage.removeItem('northstar_calc_display'); } catch(e) {}
  </script>
</body>
</html>
