<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico"/>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — NorthStar Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <a href="/" class="auth-logo">NorthStar <span>Ledger</span></a>
      <p class="auth-tagline"><em>Your financial north star. ⭐</em></p>
    </div>

    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to your account</p>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      {% if request.args.get('reset') %}
        <div class="alert alert-success">Password updated! You can now log in.</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••"/>
        </div>
        <button type="submit" class="btn-auth">Sign In</button>
      </form>

      <div class="auth-links">
        <a href="/register">Create an account</a>
        <a href="/forgot-password">Forgot password?</a>
      </div>
    </div>

    <div class="auth-footer">
      <a href="/privacy">Privacy Policy</a>
      <span class="auth-footer-dot">·</span>
      <a href="/support">Support</a>
    </div>
  </div>

</body>
</html>
