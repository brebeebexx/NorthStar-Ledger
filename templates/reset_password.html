<!doctype html><html><head><meta name="viewport" content="width=device-width, initial-scale=1" />
<style>:root{--line:#d1d5db;--ink:#1f2937;--accent:#374151}body{font-family:system-ui;background:#eef1f4;display:grid;place-items:center;min-height:100vh;margin:0}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;max-width:460px;width:92%}input,button{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;margin-top:8px}button{background:var(--accent);color:#fff;border:none;font-weight:700}.err{color:#b00020;font-weight:700;font-size:13px}</style></head><body>
<div class="card"><h3>Choose new password</h3>{% if error %}<p class="err">{{error}}</p>{% endif %}
<form method="post"><input type="hidden" name="_csrf" value="{{ csrf_token }}"><input type="password" name="password" placeholder="New password (8+ chars)" required><button type="submit">Reset password</button></form>
<p style="font-size:13px"><a href="/login">Back to login</a></p></div></body></html>
