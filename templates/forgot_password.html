<!doctype html><html><head><meta name="viewport" content="width=device-width, initial-scale=1" />
<style>:root{--line:#d1d5db;--ink:#1f2937;--muted:#6b7280;--accent:#374151}body{font-family:system-ui;background:#eef1f4;display:grid;place-items:center;min-height:100vh;margin:0}.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;max-width:520px;width:92%}input,button{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;margin-top:8px}button{background:var(--accent);color:#fff;border:none;font-weight:700}.err{color:#b00020;font-weight:700;font-size:13px}</style></head><body>
<div class="card">
  <h3>Reset password</h3>
  {% if error %}<p class="err">{{error}}</p>{% endif %}

  {% if stage == 'questions' %}
    <form method="post">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <input type="hidden" name="stage" value="questions">
      <input type="hidden" name="email" value="{{email}}">
      <label>{{q1}}</label>
      <input type="text" name="security_a1" required>
      <label style="margin-top:8px;display:block">{{q2}}</label>
      <input type="text" name="security_a2" required>
      <button type="submit">Verify answers</button>
    </form>
  {% else %}
    <form method="post">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <input type="hidden" name="stage" value="email">
      <input type="email" name="email" placeholder="Your account email" required>
      <button type="submit">Continue</button>
    </form>
  {% endif %}

  <p style="font-size:13px"><a href="/login">Back to login</a></p>
</div></body></html>
